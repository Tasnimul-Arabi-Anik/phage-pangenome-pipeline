name: ci-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Snakemake
        run: |
          python -m pip install --upgrade pip
          pip install snakemake

      - name: Compile helper scripts
        run: |
          python -m py_compile workflow/scripts/*.py
          python -m py_compile plot_pangenome_heatmap.py

      - name: Dry-run smoke test
        env:
          XDG_CACHE_HOME: ${{ github.workspace }}/.cache
        run: |
          snakemake -s workflow/Snakefile -n --configfile tests/config/ci_smoke_test.yaml --cores 1
