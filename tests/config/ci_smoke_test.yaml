project_name: ci_smoke_test
query_fasta: tests/data/klebsiella.fasta
mode: expanded

inputs:
  existing_query_proteins: ""
  existing_query_annotations: ""
  existing_query_gff: ""
  existing_query_cds: ""
  existing_references_gb: ""
  existing_reference_accessions: ""

reference_selection:
  discovery_method: blastn_remote
  max_candidates: 10
  close_target: 5
  expanded_target: 10
  min_genome_length: 15000
  max_genome_length: 500000
  require_translated_cds: true
  dereplicate: true
  remote_blast_db: nt
  remote_entrez_query: "phage[All Fields]"
  remote_blast_task: megablast
  remote_max_target_seqs: 20
  remote_fetch_chunk_size: 10
  local_blast_db: ""
  local_blast_task: megablast
  local_blast_max_target_seqs: 20

orthology:
  method: rbh_blastp
  min_identity: 30
  min_query_coverage: 70
  min_subject_coverage: 70
  max_evalue: 1e-5

plotting:
  dpi: 200
  heatmap: true
  title: CI Smoke Test Heatmap

annotation:
  blastp: false
  protein_db_fasta: ""
  protein_db_metadata: ""
  max_target_seqs: 5
  max_evalue: 1e-5
  min_identity: 30
  min_query_coverage: 50
  pfam_hmmscan: false
  pfam_db: ""
  pfam_max_evalue: 1e-3
  deeptmhmm: false
  signalp: false
  interproscan: false
